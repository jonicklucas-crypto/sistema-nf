<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema NF</title>

<!-- ✅ scripts corretos -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body { font-family:Arial; margin:0; background:#f4f6f9; }

.menu { width:220px; height:100vh; position:fixed; background:#2c3e50; }
.menu button { width:100%; padding:15px; border:none; background:none; color:white; cursor:pointer; }
.menu button:hover { background:#1abc9c; }

.conteudo { margin-left:220px; padding:20px; }

input { padding:8px; width:100%; margin:5px 0; }

.botao { padding:6px 12px; border:none; background:#1abc9c; color:white; cursor:pointer; margin-right:5px; }

.total { font-weight:bold; margin-bottom:8px; }

table { width:100%; border-collapse:collapse; background:white; font-size:11px; }
th, td { padding:5px; border:1px solid #ddd; white-space:nowrap; }

.recebido { background:#d4f4d4; }
.lancado { background:#c8e4ff; }
.cancelada { background:#ffcccc; }
.entrada { background:#fff3cd; }

.login { display:flex; justify-content:center; align-items:center; height:100vh; }
</style>
</head>

<body>

<div id="loginTela" class="login">
<div>
<h2>Login</h2>
<input id="user" value="admin">
<input id="pass" type="password" value="123456">
<button class="botao" onclick="entrar()">Entrar</button>
</div>
</div>

<div id="app" style="display:none;">

<div class="menu">
<button onclick="tela('notas')">Notas</button>
<button onclick="tela('receb')">Recebimento</button>
<button onclick="tela('sap')">SAP</button>
<button onclick="tela('excel')">Importar Excel</button>
</div>

<div class="conteudo">

<div id="notas">
<h3>Notas Fiscais</h3>

<div id="totais" class="total"></div>

<button class="botao" onclick="exportar()">Exportar</button>
<button class="botao" onclick="apagar()">Apagar</button>

<input id="busca" placeholder="Buscar..." onkeyup="filtrar()">

<table id="tabela"></table>
</div>

<!-- RECEBIMENTO -->
<div id="receb" style="display:none;">
<h3>Recebimento</h3>

<input id="chaveReceb" placeholder="Chave" oninput="buscarReceb()">

<input id="numReceb" readonly>
<input id="valorReceb" readonly>
<input id="razaoReceb" readonly>
<input id="cnpjReceb" readonly>

<input id="pedidoReceb" placeholder="Pedido">

<button class="botao" onclick="confirmarReceb()">Confirmar</button>

<!-- ✅ NOVO BOTÃO -->
<button class="botao" onclick="estornarReceb()">Estornar Recebimento</button>
</div>

<!-- SAP -->
<div id="sap" style="display:none;">
<h3>Lançamento SAP</h3>

<input id="chaveSAP" oninput="buscarSAP()">
<input id="numSAP" readonly>
<input id="valorSAP" readonly>

<button class="botao" onclick="confirmarSAP()">Confirmar</button>

<!-- ✅ NOVO BOTÃO -->
<button class="botao" onclick="estornarSAP()">Estornar SAP</button>
</div>

<div id="excel" style="display:none;">
<h3>Importar Excel</h3>
<input type="file" id="file">
<button class="botao" onclick="importar()">Importar</button>
</div>

</div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCs61LRkdUTqeFv_qJvTb5vc1h8qwI5yYQ",
  authDomain: "sistemanf.firebaseapp.com",
  databaseURL: "https://sistemanf-default-rtdb.firebaseio.com",
  projectId: "sistemanf",
  storageBucket: "sistemanf.firebasestorage.app",
  messagingSenderId: "87632051913",
  appId: "1:87632051913:web:438fc247703c2fb8915718"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let notas=[];

function entrar(){
  loginTela.style.display="none";
  app.style.display="block";
  escutarNotas();
}

function tela(t){
  ["notas","receb","sap","excel"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });
  document.getElementById(t).style.display="block";
}

function escutarNotas(){
  db.collection("notas").onSnapshot(s=>{
    notas=[];
    s.forEach(doc=>notas.push(doc.data()));
    atualizarTotais();
    render();
  });
}

function atualizarTotais(){
  let total = notas.length;
  let rec = notas.filter(n=>n.recebido==="SIM").length;
  let sap = notas.filter(n=>n.sap==="SIM").length;
  let canc = notas.filter(n=>n.situacao?.toUpperCase().includes("CANCELADA")).length;

  totais.innerText =
  `Total: ${total} | Recebidas: ${rec} | Lançadas: ${sap} | Canceladas: ${canc}`;
}

function render(){
tabela.innerHTML=`<tr>
<th>UF</th><th>CHAVE</th><th>NUMERO</th><th>SERIE</th><th>EMISSAO</th>
<th>CNPJ EMISSOR</th><th>IE EMISSOR</th><th>RAZAO SOCIAL</th>
<th>CNPJ DEST</th><th>IE DEST</th><th>RAZAO DEST</th>
<th>CFOP</th><th>SELAGEM</th><th>SITUACAO</th><th>TIPO</th>
<th>VALOR</th><th>PEDIDO</th><th>RECEBIDO</th><th>SAP</th>
</tr>`;

notas.forEach(n=>{
let cls="";
if(n.situacao?.toUpperCase().includes("ENTRADA")) cls="entrada";
else if(n.situacao?.toUpperCase().includes("CANCELADA")) cls="cancelada";
else if(n.sap==="SIM") cls="lancado";
else if(n.recebido==="SIM") cls="recebido";

tabela.innerHTML+=`
<tr class="${cls}">
<td>${n.uf||""}</td>
<td>${n.chave}</td>
<td>${n.numero}</td>
<td>${n.serie}</td>
<td>${n.emissao}</td>
<td>${n.cnpjEmit}</td>
<td>${n.ieEmit}</td>
<td>${n.razaoEmit}</td>
<td>${n.cnpjDest}</td>
<td>${n.ieDest}</td>
<td>${n.razaoDest}</td>
<td>${n.cfop}</td>
<td>${n.selagem}</td>
<td>${n.situacao}</td>
<td>${n.tipo}</td>
<td>R$ ${parseFloat(n.valor||0).toFixed(2)}</td>
<td>${n.pedido||""}</td>
<td>${n.recebido}</td>
<td>${n.sap}</td>
</tr>`;
});
}

function confirmarReceb(){
let n=notas.find(x=>x.chave===chaveReceb.value);
if(!n) return alert("❌ Nota não encontrada");

let pedido = pedidoReceb.value.trim();

if(!pedido){
  if(!confirm("⚠️ Nota sem pedido. Deseja continuar?")) return;
}

n.recebido="SIM";
n.pedido=pedido;

db.collection("notas").doc(n.chave).set(n);

alert("✅ Nota recebida!");
}

/* ✅ NOVO */
function estornarReceb(){
let n=notas.find(x=>x.chave===chaveReceb.value);
if(!n) return alert("❌ Nota não encontrada");

if(n.recebido!=="SIM"){
  return alert("⚠️ Nota não está recebida");
}

if(!confirm("Deseja estornar o recebimento?")) return;

n.recebido="NAO";
n.pedido="";

db.collection("notas").doc(n.chave).set(n);

alert("✅ Recebimento estornado!");
}

function confirmarSAP(){
let n=notas.find(x=>x.chave===chaveSAP.value);
if(!n) return alert("Não encontrada");
if(n.recebido!=="SIM") return alert("Receber primeiro");

n.sap="SIM";
db.collection("notas").doc(n.chave).set(n);

alert("✅ SAP ok");
}

/* ✅ NOVO */
function estornarSAP(){
let n=notas.find(x=>x.chave===chaveSAP.value);
if(!n) return alert("❌ Nota não encontrada");

if(n.sap!=="SIM"){
  return alert("⚠️ Nota não está lançada no SAP");
}

if(!confirm("Deseja estornar o SAP?")) return;

n.sap="NAO";

db.collection("notas").doc(n.chave).set(n);

alert("✅ SAP estornado!");
}

/* resto igual */
function buscarReceb(){
let n=notas.find(x=>x.chave===chaveReceb.value);
if(n){
numReceb.value=n.numero;
valorReceb.value=n.valor;
razaoReceb.value=n.razaoEmit;
cnpjReceb.value=n.cnpjEmit;
}
}

function buscarSAP(){
let n=notas.find(x=>x.chave===chaveSAP.value);
if(n){
numSAP.value=n.numero;
valorSAP.value=n.valor;
}
}

</script>
</body>
</html>
